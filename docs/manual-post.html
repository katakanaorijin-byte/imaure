<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0f9f7a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="X投稿ツール">
<title>半自動X投稿ツール | 予約開始レーダー</title>
<style>
:root {
  --bg: #f6f7f9;
  --card: #ffffff;
  --ink: #17202a;
  --muted: #697586;
  --line: #e5e7eb;
  --accent: #0f9f7a;
  --accent-dark: #08775b;
  --warn: #b45309;
  --warn-bg: #fff7ed;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.65;
}
header {
  background: var(--card);
  border-bottom: 1px solid var(--line);
  padding: 18px 18px 14px;
}
.wrap { max-width: 980px; margin: 0 auto; }
h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
.lead { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
main { padding: 18px; }
.panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 14px;
}
.tools {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  align-items: end;
}
label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
select, input, textarea, button {
  width: 100%;
  font: inherit;
  border-radius: 7px;
}
select, input, textarea {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
}
select, input { min-height: 42px; padding: 8px 10px; }
textarea {
  min-height: 230px;
  padding: 12px;
  resize: vertical;
  font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
  font-size: 14px;
}
button, .button {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  min-height: 42px;
  border: 0;
  padding: 9px 12px;
  background: var(--accent);
  color: #fff;
  font-weight: 800;
  text-decoration: none;
  cursor: pointer;
}
button:hover, .button:hover { background: var(--accent-dark); }
button.secondary { background: #1f2937; }
button.secondary:hover { background: #111827; }
.actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-top: 12px; }
.status { margin-top: 10px; color: var(--muted); font-size: 13px; }
.note {
  border-color: #fed7aa;
  background: var(--warn-bg);
  color: var(--warn);
  font-size: 13px;
}
.items { display: grid; gap: 10px; }
.item {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background: #fff;
  cursor: pointer;
  transition: border-color .12s, background .12s, box-shadow .12s;
}
.item:hover { border-color: #9ca3af; }
.item.selected { border-color: var(--accent); background: #ecfdf5; box-shadow: inset 0 0 0 1px var(--accent); }
.item:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.item img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; background: #f3f4f6; }
.item strong { display: block; font-size: 14px; line-height: 1.45; }
.meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
.count { font-size: 13px; color: var(--muted); margin-top: 8px; }
.count.over { color: #dc2626; font-weight: 800; }
#share { background: #111827; }
#share:hover { background: #000; }
@media (max-width: 620px) {
  header { padding: 14px 14px 10px; }
  main { padding: 12px; }
  .panel { padding: 13px; }
  h1 { font-size: 20px; }
  .item { grid-template-columns: 1fr; }
  .item img { display: none; }
  /* スマホはタップしやすいよう縦並び・大きめに。入力は16pxで自動ズームを防ぐ */
  .actions { grid-template-columns: 1fr; gap: 8px; }
  button, .button { min-height: 50px; font-size: 16px; }
  select, input { min-height: 48px; font-size: 16px; }
  textarea { min-height: 190px; font-size: 16px; }
  /* 共有・コピー等の操作ボタンを画面下に固定して片手で押せるように */
  .actions {
    position: sticky;
    bottom: 0;
    background: var(--card);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    margin: 8px -13px 0;
    padding-left: 13px;
    padding-right: 13px;
    border-top: 1px solid var(--line);
    z-index: 5;
  }
}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>半自動X投稿ツール</h1>
    <p class="lead">新着予約から投稿文を作り、コピーまたはX投稿画面を開きます。X APIは使いません。</p>
  </div>
</header>
<main>
  <div class="wrap">
    <section class="panel note">
      GitHub ActionsのAPI自動投稿は無効化済みです。再開する場合だけ、Repository variablesに <strong>ENABLE_API_AUTO_POST=true</strong> を設定してください。
    </section>

    <section class="panel">
      <div class="tools">
        <div>
          <label for="mode">投稿タイプ</label>
          <select id="mode">
            <option value="summary">新着まとめ</option>
            <option value="single">1商品ピックアップ</option>
          </select>
        </div>
        <div>
          <label for="genre">カテゴリ</label>
          <select id="genre"></select>
        </div>
        <div>
          <label for="limit">表示件数</label>
          <select id="limit">
            <option value="3">3件</option>
            <option value="2">2件</option>
            <option value="1">1件</option>
          </select>
        </div>
        <div>
          <label for="tone">ひとこと</label>
          <select id="tone">
            <option value="soft">やわらかめ</option>
            <option value="watch">見張り中</option>
            <option value="calm">落ち着き</option>
            <option value="none">なし</option>
          </select>
        </div>
        <div>
          <button id="refresh" type="button">投稿文を作る</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <label for="postText">投稿文</label>
      <textarea id="postText" spellcheck="false"></textarea>
      <div id="count" class="count"></div>
      <div class="actions">
        <button id="share" type="button" hidden>📲 スマホで共有(Xアプリへ)</button>
        <button id="copy" type="button">コピー</button>
        <a id="openX" class="button" target="_blank" rel="noopener">X投稿画面を開く</a>
        <button id="next" class="secondary" type="button">別候補にする</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="panel">
      <label>投稿候補(タップで選択 / もう一度タップで解除)</label>
      <div id="items" class="items"></div>
    </section>
  </div>
</main>

<script>
const state = {
  data: null,
  tagRules: null,
  fresh: [],
  pool: [],
  selected: new Set(),
  offset: 0
};

const els = {
  mode: document.getElementById("mode"),
  genre: document.getElementById("genre"),
  limit: document.getElementById("limit"),
  tone: document.getElementById("tone"),
  refresh: document.getElementById("refresh"),
  postText: document.getElementById("postText"),
  count: document.getElementById("count"),
  copy: document.getElementById("copy"),
  openX: document.getElementById("openX"),
  next: document.getElementById("next"),
  share: document.getElementById("share"),
  status: document.getElementById("status"),
  items: document.getElementById("items")
};

function cleanText(value) {
  return String(value || "").replace(/\s+/g, " ").trim();
}

function trimText(value, max) {
  const text = cleanText(value);
  return text.length > max ? text.slice(0, max - 1) + "…" : text;
}

function priceText(value) {
  if (!value) return "";
  return Number(value).toLocaleString("ja-JP") + "円";
}

// 商品名の「主な部分」を取り出す。先頭の宣伝(【予約商品】[予約:8/7]等)を除き、
// 学習したタイトル語(作品名・シリーズ名)に当たるまで先頭のノイズ単語を落とす。
// 中間・末尾の作品名カッコ(【推しの子】等)は残す。
const NAME_LEAD_BRACKET = /^[\s　]*[【［\[（(][^】］\]）)]*[】］\]）)]/;
const NOISE_IN_BRACKET = /予約|発送|発売|入荷|お届け|クーポン|OFF|ポイント|送料|特典|限定|抽選|即納|受付|新品|中古|セール|数量|先着|残り|楽天|ランキング|位|人気|キャンペーン|割引|円|%|％|\d|TCG|ACC|カートン|前日/;
const NOISE_TOKEN = /^(ご?予約(販売|商品|受付)?|前日発送|発送|発売|入荷|お届け|ばら売り|バラ売り|単品|特典|レビュー特典|送料無料|送料込み?|限定|限定販売|数量限定|抽選|即納|新品|新品未開封|未開封|中古|セール|先着|残りわずか|TCG|ACC|カートン)$/;
const NOISE_TOKEN_LOOSE = /^\d+(パック|個|点|箱|枚|本|セット|円|%|％|周年|th|nd|st|期)?$|^\d+[年月日/.\-]|^.+月\d+日|.+(OFF|オフ)$/;

function coreName(raw) {
  let s = cleanText(raw).normalize("NFKC");
  for (let i = 0; i < 6; i++) {
    const m = s.match(NAME_LEAD_BRACKET);
    if (m && NOISE_IN_BRACKET.test(m[0])) s = s.slice(m[0].length).trim();
    else break;
  }
  const titles = (state.tagRules && state.tagRules.title_keywords) || [];
  let tokens = s.split(/[\s　]+/).filter(Boolean);
  let guard = 0;
  while (tokens.length > 1 && guard++ < 12) {
    const head = tokens[0];
    if (titles.some(t => head.includes(t))) break;
    if (NOISE_TOKEN.test(head) || NOISE_TOKEN_LOOSE.test(head)) { tokens.shift(); continue; }
    break;
  }
  return tokens.join(" ").trim() || cleanText(raw);
}

function weightedLength(text) {
  let total = 0;
  for (const part of text.split(/\s+/)) {
    if (/^https?:\/\//.test(part)) {
      total += 24;
      continue;
    }
    for (const ch of part) total += ch.charCodeAt(0) < 0x1100 ? 1 : 2;
    total += 1;
  }
  return Math.max(0, total - 1);
}

function flattenFresh(data) {
  const rows = [];
  for (const genre of data.genres || []) {
    for (const item of genre.items || []) {
      if (item.is_new) rows.push({ genre, item });
    }
  }
  return rows;
}

function rowKey(row) {
  return row.item.url || (row.genre.name + "::" + row.item.name);
}

// いま選べる候補(カテゴリで絞り込んだ新着予約すべて)
function candidatePool() {
  const genreName = els.genre.value;
  let rows = state.fresh;
  if (genreName !== "__all") rows = rows.filter(row => row.genre.name === genreName);
  return rows;
}

// 候補の先頭から自動でN件選ぶ(手動選択していないときの初期状態)
function autoSelect() {
  state.selected = new Set();
  const pool = state.pool;
  if (!pool.length) return;
  const count = els.mode.value === "single" ? 1 : Number(els.limit.value);
  const start = state.offset % pool.length;
  const rotated = pool.slice(start).concat(pool.slice(0, start));
  for (const row of rotated.slice(0, count)) state.selected.add(rowKey(row));
}

// 実際に投稿文へ入れる商品(選択済みのものを候補の並び順で)
function postRows() {
  const rows = state.pool.filter(row => state.selected.has(rowKey(row)));
  return els.mode.value === "single" ? rows.slice(0, 1) : rows;
}

// 候補をタップしたときの選択切り替え
function toggleSelect(row) {
  const key = rowKey(row);
  if (els.mode.value === "single") {
    state.selected = new Set([key]);
  } else if (state.selected.has(key)) {
    state.selected.delete(key);
  } else {
    state.selected.add(key);
  }
  updatePost();
}

// カテゴリ・モード・件数が変わったら候補を作り直して自動選択し直す
function refreshPool() {
  state.pool = candidatePool();
  autoSelect();
  updatePost();
}

function normalizeForMatch(value) {
  return cleanText(value).toLowerCase();
}

function uniqueTags(tags) {
  const cleaned = tags
    .map(tag => cleanText(tag))
    .filter(tag => tag.startsWith("#") && tag.length > 1);
  return [...new Set(cleaned)];
}

function tagsForRow(row) {
  const rules = state.tagRules || {};
  const tags = [];
  const genreName = cleanText(row.genre.name);
  const genreTags = rules.genre_tags && rules.genre_tags[genreName];
  if (Array.isArray(genreTags)) tags.push(...genreTags);

  const haystack = normalizeForMatch(`${genreName} ${row.item.name || ""}`);
  for (const rule of rules.keyword_rules || []) {
    const matched = (rule.keywords || []).some(keyword => haystack.includes(normalizeForMatch(keyword)));
    if (matched) tags.push(...(rule.tags || []));
  }
  return uniqueTags(tags);
}

function buildHashtags(rows) {
  const rules = state.tagRules || {};
  const tags = [];
  for (const row of rows) tags.push(...tagsForRow(row));
  tags.push(...(rules.default_tags || ["#予約開始レーダー", "#ホビー予約"]));
  return uniqueTags(tags).slice(0, 4).join(" ");
}

function formatTemplate(template, rows) {
  const category = rows[0] ? cleanText(rows[0].genre.name) : "ホビー";
  return cleanText(template)
    .replaceAll("{category}", category)
    .replaceAll("{count}", String(rows.length));
}

function humanLine(rows, kind) {
  const tone = els.tone.value;
  const count = rows.length;
  const category = rows[0] ? cleanText(rows[0].genre.name) : "ホビー";
  const copyRules = state.tagRules && state.tagRules.copy_rules;
  const learned = copyRules && copyRules[kind === "single" ? "single_openers" : "summary_openers"];
  const lines = learned || {
    soft: [
      `${category}の新着予約、気になるものを拾っておきました。`,
      `あとで見返しやすいように、${category}まわりの新着をまとめます。`,
      "予約まわり、今日も少し動きがありました。"
    ],
    watch: [
      `${category}まわりに予約開始の動きあり。ざっと確認用です。`,
      `見逃しやすい予約開始、${count}件だけまとめてチェックしておきます。`,
      "在庫や価格は動きやすいので、気になるものは早めに確認を。",
    ],
    calm: [
      `必要な人に届けばいいな、くらいの温度で${category}の新着を置いておきます。`,
      "急ぎすぎず、でも見落としにくいようにメモしておきます。",
      `${count}件だけ、見やすいように抜き出しました。`
    ],
    none: [""]
  };
  const pool = lines[tone] || lines.soft;
  const seed = rows.reduce((sum, row) => sum + cleanText(row.item.name).length, count);
  return formatTemplate(pool[seed % pool.length], rows);
}

// data.jsonにslugが無い移行期でもカテゴリページURLを作れるようにフォールバックを持つ
const SLUG_BY_NAME = {
  "ポケモンカード": "pokemon-card",
  "ワンピースカード": "onepiece-card",
  "遊戯王・他カード": "yugioh",
  "フィギュア": "figure",
  "ねんどろいど・figma": "nendoroid",
  "ガンプラ・プラモデル": "gunpla",
  "ゲームソフト": "game",
  "アニメBlu-ray・CD": "anime-bd",
  "特撮・なりきり玩具": "tokusatsu",
  "鉄道模型": "train-model",
  "トミカ・ミニカー": "tomica",
  "ぬいぐるみ・グッズ": "plush"
};

function siteBase() {
  const url = (state.data && state.data.site_url) || "https://katakanaorijin-byte.github.io/imaure/";
  return url.endsWith("/") ? url : url + "/";
}

function genreSlug(genre) {
  return cleanText(genre.slug) || SLUG_BY_NAME[cleanText(genre.name)] || "";
}

// 投稿に載せるURL。同一カテゴリならそのカテゴリページ、複数カテゴリ混在ならトップ。
function pageUrlForRows(rows) {
  const home = siteBase();
  if (rows.length && rows.every(row => row.genre.name === rows[0].genre.name)) {
    const slug = genreSlug(rows[0].genre);
    if (slug) return home + slug + "/";
  }
  return home;
}

// 標準投稿は重み付き280(日本語1文字=2)=日本語で約140文字。
// X Premium(長文投稿)契約済みのため、商品名は短縮せず全文表示する。
// 280を超える分は長文投稿として送信される(カウンターで目安を表示)。
const STD_LIMIT = 280;

function buildSummary(rows, opts) {
  opts = opts || {};
  const nameLimit = opts.nameLimit || 32;
  const withOpener = opts.withOpener !== false;
  const now = new Date();
  const date = `${now.getMonth() + 1}/${now.getDate()}`;
  if (!rows.length) return "";
  const siteUrl = pageUrlForRows(rows);
  const sameGenre = rows.every(row => row.genre.name === rows[0].genre.name);
  const genreName = cleanText(rows[0].genre.name);
  const head = sameGenre
    ? `【${date} 予約開始】${genreName}に新着${rows.length}件🆕`
    : `【${date} 予約開始】新着${rows.length}件まとめ🆕`;
  const lines = [head];
  if (withOpener) {
    const opener = humanLine(rows, "summary");
    if (opener) lines.push(opener);
  }
  lines.push("");
  for (const row of rows) {
    const icon = cleanText(row.genre.icon) || "・";
    const name = trimText(coreName(row.item.name), nameLimit);
    const rel = row.item.release ? `（${cleanText(row.item.release)}発売）` : "";
    const price = priceText(row.item.price);
    lines.push(`${icon} ${name}${rel}${price ? " " + price : ""}`);
  }
  lines.push("");
  lines.push("▼一覧はこちら");
  lines.push(siteUrl);
  lines.push(buildHashtags(rows));
  return lines.join("\n");
}

function buildSingle(rows, opts) {
  opts = opts || {};
  const nameLimit = opts.nameLimit || 64;
  const withOpener = opts.withOpener !== false;
  const withShop = opts.withShop !== false;
  const row = rows[0];
  if (!row) return "";
  const siteUrl = pageUrlForRows(rows);
  const icon = cleanText(row.genre.icon);
  const price = priceText(row.item.price);
  const release = row.item.release ? `${cleanText(row.item.release)}発売` : "";
  const shop = cleanText(row.item.shop);
  const detail = [price ? `価格 ${price}` : "", release].filter(Boolean).join(" / ");
  const lines = [];
  if (withOpener) {
    const opener = humanLine(rows, "single") || `${cleanText(row.genre.name)}で予約開始を確認しました。`;
    lines.push(opener + (row.item.hot ? " 🔥注目です。" : ""));
    lines.push("");
  }
  lines.push(`${icon ? icon + " " : ""}${trimText(coreName(row.item.name), nameLimit)}`);
  if (detail) lines.push(detail);
  if (withShop && shop) lines.push(`ショップ ${shop}`);
  lines.push("");
  lines.push("▼在庫チェックはこちら");
  lines.push(siteUrl);
  lines.push(buildHashtags(rows));
  return lines.join("\n");
}

// X Premium(長文投稿)契約済みのため、商品名は短縮せず全文を出す。
// 先頭の宣伝はcoreName()で除去済み。文字数による削減はしない。
function buildFitted(rows, mode) {
  const opt = mode === "single"
    ? { nameLimit: 999, withOpener: true, withShop: true }
    : { nameLimit: 999, withOpener: true };
  const text = mode === "single" ? buildSingle(rows, opt) : buildSummary(rows, opt);
  return { text, rows };
}

function renderItems() {
  els.items.innerHTML = "";
  const pool = state.pool;
  if (!pool.length) {
    els.items.textContent = "新着予約の候補がありません。カテゴリを変えてみてください。";
    return;
  }
  const shown = pool.slice(0, 50);
  for (const row of shown) {
    const selected = state.selected.has(rowKey(row));
    const node = document.createElement("div");
    node.className = "item" + (selected ? " selected" : "");
    node.setAttribute("role", "button");
    node.tabIndex = 0;
    node.setAttribute("aria-pressed", selected ? "true" : "false");
    const img = document.createElement("img");
    img.src = row.item.image || "";
    img.alt = "";
    const body = document.createElement("div");
    const title = document.createElement("strong");
    title.textContent = (selected ? "✓ " : "") + cleanText(row.item.name);
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = [
      cleanText(row.genre.name),
      cleanText(row.item.shop),
      priceText(row.item.price),
      row.item.release ? cleanText(row.item.release) + "発売" : ""
    ].filter(Boolean).join(" / ");
    body.append(title, meta);
    node.append(img, body);
    node.addEventListener("click", () => toggleSelect(row));
    node.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        toggleSelect(row);
      }
    });
    els.items.append(node);
  }
  if (pool.length > shown.length) {
    const more = document.createElement("div");
    more.className = "count";
    more.textContent = `ほか${pool.length - shown.length}件あります。カテゴリで絞ると選びやすいです。`;
    els.items.append(more);
  }
}

function updatePost() {
  const selected = postRows();
  const fit = buildFitted(selected, els.mode.value);
  els.postText.value = fit.text;
  renderItems();
  updateCount();
  els.status.textContent = "";
}

function updateCount() {
  const len = weightedLength(els.postText.value);
  const jp = Math.ceil(len / 2);
  els.count.textContent = len > STD_LIMIT
    ? `目安文字数: ${len}（日本語で約${jp}字）・標準280超はX長文投稿で送信`
    : `目安文字数: ${len} / ${STD_LIMIT}（日本語で約${jp}字）`;
  els.count.classList.toggle("over", len > 25000);
  els.openX.href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(els.postText.value);
}

function fillGenres() {
  els.genre.innerHTML = "";
  const all = document.createElement("option");
  all.value = "__all";
  all.textContent = "すべて";
  els.genre.append(all);
  for (const genre of state.data.genres || []) {
    const freshCount = (genre.items || []).filter(item => item.is_new).length;
    if (!freshCount) continue;
    const opt = document.createElement("option");
    opt.value = genre.name;
    opt.textContent = `${cleanText(genre.name)}（${freshCount}件）`;
    els.genre.append(opt);
  }
}

async function copyPost() {
  try {
    await navigator.clipboard.writeText(els.postText.value);
    els.status.textContent = "投稿文をコピーしました。X投稿画面で貼り付けできます。";
  } catch (e) {
    // クリップボードAPIが使えない端末向けのフォールバック(テキストを選択する)
    els.postText.focus();
    els.postText.select();
    els.status.textContent = "コピーできない端末です。選択状態にしたので長押し→コピーしてください。";
  }
}

async function sharePost() {
  try {
    await navigator.share({ text: els.postText.value });
    els.status.textContent = "共有メニューを開きました。Xアプリを選んで投稿してください。";
  } catch (e) {
    // ユーザーがキャンセルした場合などは何もしない
  }
}

async function boot() {
  try {
    const [dataRes, tagRes] = await Promise.all([
      fetch("data.json", { cache: "no-store" }),
      fetch("hashtag-rules.json", { cache: "no-store" })
    ]);
    state.data = await dataRes.json();
    state.tagRules = tagRes.ok ? await tagRes.json() : null;
    state.fresh = flattenFresh(state.data);
    fillGenres();
    refreshPool();
    els.status.textContent = `${state.fresh.length}件の新着候補を読み込みました。`;
  } catch (error) {
    els.status.textContent = "data.jsonを読み込めませんでした。GitHub Pages上で開くか、ローカルサーバー経由で開いてください。";
  }
}

els.refresh.addEventListener("click", updatePost);
els.mode.addEventListener("change", () => { state.offset = 0; refreshPool(); });
els.genre.addEventListener("change", () => { state.offset = 0; refreshPool(); });
els.limit.addEventListener("change", () => { state.offset = 0; refreshPool(); });
els.tone.addEventListener("change", updatePost);
els.postText.addEventListener("input", updateCount);
els.copy.addEventListener("click", copyPost);
els.next.addEventListener("click", () => {
  const step = els.mode.value === "single" ? 1 : (Number(els.limit.value) || 1);
  state.offset += step;
  autoSelect();
  updatePost();
});
// スマホなどネイティブ共有が使える端末では「共有」ボタンを出してXアプリへ直接渡す
if (navigator.share) {
  els.share.hidden = false;
  els.share.addEventListener("click", sharePost);
}

boot();
</script>
</body>
</html>
