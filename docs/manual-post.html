<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>半自動X投稿ツール | 予約開始レーダー</title>
<style>
:root {
  --bg: #f6f7f9;
  --card: #ffffff;
  --ink: #17202a;
  --muted: #697586;
  --line: #e5e7eb;
  --accent: #0f9f7a;
  --accent-dark: #08775b;
  --warn: #b45309;
  --warn-bg: #fff7ed;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.65;
}
header {
  background: var(--card);
  border-bottom: 1px solid var(--line);
  padding: 18px 18px 14px;
}
.wrap { max-width: 980px; margin: 0 auto; }
h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
.lead { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
main { padding: 18px; }
.panel {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 14px;
}
.tools {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  align-items: end;
}
label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
select, input, textarea, button {
  width: 100%;
  font: inherit;
  border-radius: 7px;
}
select, input, textarea {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
}
select, input { min-height: 42px; padding: 8px 10px; }
textarea {
  min-height: 230px;
  padding: 12px;
  resize: vertical;
  font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
  font-size: 14px;
}
button, .button {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  min-height: 42px;
  border: 0;
  padding: 9px 12px;
  background: var(--accent);
  color: #fff;
  font-weight: 800;
  text-decoration: none;
  cursor: pointer;
}
button:hover, .button:hover { background: var(--accent-dark); }
button.secondary { background: #1f2937; }
button.secondary:hover { background: #111827; }
.actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-top: 12px; }
.status { margin-top: 10px; color: var(--muted); font-size: 13px; }
.note {
  border-color: #fed7aa;
  background: var(--warn-bg);
  color: var(--warn);
  font-size: 13px;
}
.items { display: grid; gap: 10px; }
.item {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background: #fff;
}
.item img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; background: #f3f4f6; }
.item strong { display: block; font-size: 14px; line-height: 1.45; }
.meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
.count { font-size: 13px; color: var(--muted); margin-top: 8px; }
.count.over { color: #dc2626; font-weight: 800; }
@media (max-width: 620px) {
  .item { grid-template-columns: 1fr; }
  .item img { display: none; }
}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>半自動X投稿ツール</h1>
    <p class="lead">新着予約から投稿文を作り、コピーまたはX投稿画面を開きます。X APIは使いません。</p>
  </div>
</header>
<main>
  <div class="wrap">
    <section class="panel note">
      GitHub ActionsのAPI自動投稿は無効化済みです。再開する場合だけ、Repository variablesに <strong>ENABLE_API_AUTO_POST=true</strong> を設定してください。
    </section>

    <section class="panel">
      <div class="tools">
        <div>
          <label for="mode">投稿タイプ</label>
          <select id="mode">
            <option value="summary">新着まとめ</option>
            <option value="single">1商品ピックアップ</option>
          </select>
        </div>
        <div>
          <label for="genre">カテゴリ</label>
          <select id="genre"></select>
        </div>
        <div>
          <label for="limit">表示件数</label>
          <select id="limit">
            <option value="3">3件</option>
            <option value="2">2件</option>
            <option value="1">1件</option>
          </select>
        </div>
        <div>
          <label for="tone">ひとこと</label>
          <select id="tone">
            <option value="soft">やわらかめ</option>
            <option value="watch">見張り中</option>
            <option value="calm">落ち着き</option>
            <option value="none">なし</option>
          </select>
        </div>
        <div>
          <button id="refresh" type="button">投稿文を作る</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <label for="postText">投稿文</label>
      <textarea id="postText" spellcheck="false"></textarea>
      <div id="count" class="count"></div>
      <div class="actions">
        <button id="copy" type="button">コピー</button>
        <a id="openX" class="button" target="_blank" rel="noopener">X投稿画面を開く</a>
        <button id="next" class="secondary" type="button">別候補にする</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="panel">
      <label>投稿候補</label>
      <div id="items" class="items"></div>
    </section>
  </div>
</main>

<script>
const state = {
  data: null,
  tagRules: null,
  fresh: [],
  offset: 0
};

const els = {
  mode: document.getElementById("mode"),
  genre: document.getElementById("genre"),
  limit: document.getElementById("limit"),
  tone: document.getElementById("tone"),
  refresh: document.getElementById("refresh"),
  postText: document.getElementById("postText"),
  count: document.getElementById("count"),
  copy: document.getElementById("copy"),
  openX: document.getElementById("openX"),
  next: document.getElementById("next"),
  status: document.getElementById("status"),
  items: document.getElementById("items")
};

function cleanText(value) {
  return String(value || "").replace(/\s+/g, " ").trim();
}

function trimText(value, max) {
  const text = cleanText(value);
  return text.length > max ? text.slice(0, max - 1) + "…" : text;
}

function priceText(value) {
  if (!value) return "";
  return Number(value).toLocaleString("ja-JP") + "円";
}

function weightedLength(text) {
  let total = 0;
  for (const part of text.split(/\s+/)) {
    if (/^https?:\/\//.test(part)) {
      total += 24;
      continue;
    }
    for (const ch of part) total += ch.charCodeAt(0) < 0x1100 ? 1 : 2;
    total += 1;
  }
  return Math.max(0, total - 1);
}

function flattenFresh(data) {
  const rows = [];
  for (const genre of data.genres || []) {
    for (const item of genre.items || []) {
      if (item.is_new) rows.push({ genre, item });
    }
  }
  return rows;
}

function selectedRows() {
  const genreName = els.genre.value;
  let rows = state.fresh;
  if (genreName !== "__all") rows = rows.filter(row => row.genre.name === genreName);
  if (!rows.length) return [];
  const count = Number(els.limit.value);
  const start = state.offset % rows.length;
  const rotated = rows.slice(start).concat(rows.slice(0, start));
  return rotated.slice(0, count);
}

function normalizeForMatch(value) {
  return cleanText(value).toLowerCase();
}

function uniqueTags(tags) {
  const cleaned = tags
    .map(tag => cleanText(tag))
    .filter(tag => tag.startsWith("#") && tag.length > 1);
  return [...new Set(cleaned)];
}

function tagsForRow(row) {
  const rules = state.tagRules || {};
  const tags = [];
  const genreName = cleanText(row.genre.name);
  const genreTags = rules.genre_tags && rules.genre_tags[genreName];
  if (Array.isArray(genreTags)) tags.push(...genreTags);

  const haystack = normalizeForMatch(`${genreName} ${row.item.name || ""}`);
  for (const rule of rules.keyword_rules || []) {
    const matched = (rule.keywords || []).some(keyword => haystack.includes(normalizeForMatch(keyword)));
    if (matched) tags.push(...(rule.tags || []));
  }
  return uniqueTags(tags);
}

function buildHashtags(rows) {
  const rules = state.tagRules || {};
  const tags = [];
  for (const row of rows) tags.push(...tagsForRow(row));
  tags.push(...(rules.default_tags || ["#予約開始レーダー", "#ホビー予約"]));
  return uniqueTags(tags).slice(0, 4).join(" ");
}

function formatTemplate(template, rows) {
  const category = rows[0] ? cleanText(rows[0].genre.name) : "ホビー";
  return cleanText(template)
    .replaceAll("{category}", category)
    .replaceAll("{count}", String(rows.length));
}

function humanLine(rows, kind) {
  const tone = els.tone.value;
  const count = rows.length;
  const category = rows[0] ? cleanText(rows[0].genre.name) : "ホビー";
  const copyRules = state.tagRules && state.tagRules.copy_rules;
  const learned = copyRules && copyRules[kind === "single" ? "single_openers" : "summary_openers"];
  const lines = learned || {
    soft: [
      `${category}の新着予約、気になるものを拾っておきました。`,
      `あとで見返しやすいように、${category}まわりの新着をまとめます。`,
      "予約まわり、今日も少し動きがありました。"
    ],
    watch: [
      `${category}まわりに予約開始の動きあり。ざっと確認用です。`,
      `見逃しやすい予約開始、${count}件だけまとめてチェックしておきます。`,
      "在庫や価格は動きやすいので、気になるものは早めに確認を。",
    ],
    calm: [
      `必要な人に届けばいいな、くらいの温度で${category}の新着を置いておきます。`,
      "急ぎすぎず、でも見落としにくいようにメモしておきます。",
      `${count}件だけ、見やすいように抜き出しました。`
    ],
    none: [""]
  };
  const pool = lines[tone] || lines.soft;
  const seed = rows.reduce((sum, row) => sum + cleanText(row.item.name).length, count);
  return formatTemplate(pool[seed % pool.length], rows);
}

function buildSummary(rows) {
  const now = new Date();
  const date = `${now.getMonth() + 1}/${now.getDate()}`;
  const siteUrl = state.data.site_url || "https://katakanaorijin-byte.github.io/imaure/";
  const lines = [
    `【${date} 新着予約】`,
    humanLine(rows, "summary") || "ホビー商品の予約開始をチェックしました。"
  ];
  for (const row of rows) {
    const name = trimText(row.item.name, 34);
    const rel = row.item.release ? `（${cleanText(row.item.release)}発売）` : "";
    const price = priceText(row.item.price);
    lines.push(`・${name}${rel}${price ? " / " + price : ""}`);
  }
  lines.push("");
  lines.push(siteUrl);
  lines.push(buildHashtags(rows));
  return lines.join("\n");
}

function buildSingle(rows) {
  const row = rows[0];
  if (!row) return "";
  const siteUrl = state.data.site_url || "https://katakanaorijin-byte.github.io/imaure/";
  const price = priceText(row.item.price);
  const release = row.item.release ? `発売時期: ${cleanText(row.item.release)}` : "";
  const note = humanLine(rows, "single");
  return [
    note || "新着予約をチェックしました。",
    "",
    trimText(row.item.name, 72),
    price ? `価格: ${price}` : "",
    release,
    "",
    siteUrl,
    buildHashtags(rows)
  ].filter(Boolean).join("\n");
}

function renderItems(rows) {
  els.items.innerHTML = "";
  if (!rows.length) {
    els.items.textContent = "新着予約の候補がありません。";
    return;
  }
  for (const row of rows) {
    const node = document.createElement("div");
    node.className = "item";
    const img = document.createElement("img");
    img.src = row.item.image || "";
    img.alt = "";
    const body = document.createElement("div");
    const title = document.createElement("strong");
    title.textContent = cleanText(row.item.name);
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = [
      cleanText(row.genre.name),
      cleanText(row.item.shop),
      priceText(row.item.price)
    ].filter(Boolean).join(" / ");
    body.append(title, meta);
    node.append(img, body);
    els.items.append(node);
  }
}

function updatePost() {
  const rows = selectedRows();
  const text = els.mode.value === "single" ? buildSingle(rows) : buildSummary(rows);
  els.postText.value = text;
  renderItems(rows);
  updateCount();
}

function updateCount() {
  const len = weightedLength(els.postText.value);
  els.count.textContent = `目安文字数: ${len} / 280`;
  els.count.classList.toggle("over", len > 280);
  els.openX.href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(els.postText.value);
}

function fillGenres() {
  els.genre.innerHTML = "";
  const all = document.createElement("option");
  all.value = "__all";
  all.textContent = "すべて";
  els.genre.append(all);
  for (const genre of state.data.genres || []) {
    const freshCount = (genre.items || []).filter(item => item.is_new).length;
    if (!freshCount) continue;
    const opt = document.createElement("option");
    opt.value = genre.name;
    opt.textContent = `${cleanText(genre.name)}（${freshCount}件）`;
    els.genre.append(opt);
  }
}

async function copyPost() {
  await navigator.clipboard.writeText(els.postText.value);
  els.status.textContent = "投稿文をコピーしました。X投稿画面で貼り付けできます。";
}

async function boot() {
  try {
    const [dataRes, tagRes] = await Promise.all([
      fetch("data.json", { cache: "no-store" }),
      fetch("hashtag-rules.json", { cache: "no-store" })
    ]);
    state.data = await dataRes.json();
    state.tagRules = tagRes.ok ? await tagRes.json() : null;
    state.fresh = flattenFresh(state.data);
    fillGenres();
    updatePost();
    els.status.textContent = `${state.fresh.length}件の新着候補を読み込みました。`;
  } catch (error) {
    els.status.textContent = "data.jsonを読み込めませんでした。GitHub Pages上で開くか、ローカルサーバー経由で開いてください。";
  }
}

els.refresh.addEventListener("click", updatePost);
els.mode.addEventListener("change", () => { state.offset = 0; updatePost(); });
els.genre.addEventListener("change", () => { state.offset = 0; updatePost(); });
els.limit.addEventListener("change", updatePost);
els.tone.addEventListener("change", updatePost);
els.postText.addEventListener("input", updateCount);
els.copy.addEventListener("click", copyPost);
els.next.addEventListener("click", () => { state.offset += Number(els.limit.value); updatePost(); });

boot();
</script>
</body>
</html>
